<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>锦致科技 - 智能基础设施生态</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#0050d4",
            secondary: "#702ae1",
            background: "#f5f7f9",
            "on-surface": "#2c2f31",
            "surface-container-low": "#eef1f3",
            "surface-bright": "#f5f7f9",
          },
          fontFamily: {
            headline: ["Manrope"],
            body: ["Inter"],
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav { backdrop-filter: blur(20px); }
  </style>
</head>
<body class="font-body bg-background text-on-surface">

  <!-- 头部引入 -->
  <div id="header"></div>

  <!-- 首页主体内容 -->
  <main class="pt-32 pb-20">
    <section class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <span class="text-primary font-semibold">以人为本的智能基础设施</span>
        <h1 class="text-4xl md:text-5xl font-headline font-bold mt-4 leading-tight">
          用<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">数字智能</span><br/>
          构建未来生态
        </h1>
        <p class="mt-6 text-lg text-gray-600">我们提供智慧旅游、智慧农业、智慧社区一体化解决方案，以技术驱动可持续发展与高效运营。</p>
        <div class="mt-8 flex gap-4">
          <a href="list.html" class="bg-gradient-to-r from-primary to-secondary text-white px-6 py-3 rounded-lg font-bold hover:opacity-90">查看解决方案</a>
          <a href="#" class="border border-gray-300 px-6 py-3 rounded-lg font-bold">联系我们</a>
        </div>
      </div>
      <div class="relative overflow-hidden rounded-2xl shadow-xl">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuFnV1kE4XdpQXwQkE2m5B1kE2m5B1kE2m5B1kE2m5B1kE2m5B1kE2m5B1k" alt="智慧城市" class="w-full h-auto object-cover">
      </div>
    </section>

    <section class="mt-24 bg-surface-container-low py-16">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <h2 class="text-3xl font-bold font-headline">核心生态领域</h2>
        <p class="mt-4 text-gray-600">为不同场景提供深度数字化能力</p>
        <div class="mt-12 grid md:grid-cols-3 gap-8">
          <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition-shadow">
            <h3 class="text-xl font-bold mt-4">智慧旅游</h3>
            <p class="mt-2 text-gray-600">全域数字化景区运营与体验升级</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition-shadow">
            <h3 class="text-xl font-bold mt-4">智慧农业</h3>
            <p class="mt-2 text-gray-600">AI 驱动的精准种植与产量优化</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition-shadow">
            <h3 class="text-xl font-bold mt-4">智慧邻里</h3>
            <p class="mt-2 text-gray-600">安全、低碳、便捷的未来社区</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 底部引入 -->
  <div id="footer"></div>

  <!-- JS 加载公共组件 -->
  <script>
    fetch("header.html").then(res=>res.text()).then(html=>document.getElementById("header").innerHTML=html);
    fetch("footer.html").then(res=>res.text()).then(html=>document.getElementById("footer").innerHTML=html);
  </script>
</body>
</html>
