<body class="bg-background text-on-surface">

    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full z-50 bg-slate-50/90 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center px-4 py-4 max-w-7xl mx-auto">

        </div>
    </nav>

    <main class="pt-14">
        <!-- 第一板块：Hero -->
        <section class="relative min-h-[500px] flex items-center px-4 overflow-hidden bg-surface-bright">

                <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_083109_283f3553-e28f-428b-a723-d639c617eb2b.mp4" type="video/mp4">

            <div class="absolute inset-0 bg-surface-bright/80 z-[1]"></div>

            <div class="max-w-7xl mx-auto z-10">
                <div class="space-y-5">
                    <div class="inline-block px-3 py-1 rounded-full bg-primary-container/20 text-primary text-xs font-bold">
                        光影建筑师
                    </div>
                    <h1 class="text-3xl font-bold text-on-surface leading-tight">
                        让<span class="bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">数字智能</span>与人类生活交相辉映
                    </h1>
                    <p class="text-base text-on-surface-variant">
                        我们致力于构建服务于社区的智能基础设施生态系统。从可持续农业到无缝衔接的城市旅游，我们设计面向未来的隐形建筑。
                    </p>
                    <div class="flex gap-3">
                        <a href="detail.html">
                            <button class="bg-gradient-to-r from-primary to-secondary text-white px-5 py-3 rounded-lg font-bold">
                                探索方案
                            </button>
                        </a>
                        <button class="bg-gray-200 px-5 py-3 rounded-lg font-bold">
                            观看演示
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 第二板块：核心业务（修复错位！） -->
        <section class="py-16 bg-surface-container-low px-4">
            <div class="max-w-7xl mx-auto">
                <div class="mb-10">
                    <span class="text-primary text-sm font-bold">核心业务</span>
                    <h2 class="text-2xl font-bold mt-2">全场景智能生态</h2>
                </div>

                <!-- 关键修复：不乱、不叠加、不溢出 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <div class="h-40 rounded-xl overflow-hidden mb-4">
                            <img src="https://picsum.photos/600/400" class="w-full h-full object-cover" alt="">
                        </div>
                        <h3 class="text-lg font-bold">智慧旅游</h3>
                        <p class="text-gray-500 text-sm mt-2">通过实时游客流分析和个性化数字礼宾服务，提升目的地管理水平。</p>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <div class="h-40 rounded-xl overflow-hidden mb-4">

                            <img src="https://picsum.photos/600/400" class="w-full h-full object-cover" alt="">

                        <p class="text-gray-500 text-sm mt-2">设计整合了可再生能源和智能社交空间的智慧邻里社区。</p>
                    </div>

        <section class="py-16 px-4">
            <div class="max-w-7xl mx-auto text-center">
                <h2 class="text-2xl font-bold mb-4">以匠心致创新</h2>
                <p class="text-gray-500 text-sm">我们不仅在构建技术，更是在打造通过精密的直觉工程赋能人类潜力的工具。</p>
