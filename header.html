<!-- header.html -->
<nav class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-6 md:px-8 py-4 max-w-7xl mx-auto">
    <div class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
      锦致科技
    </div>

    <div class="hidden md:flex items-center space-x-10">
      <a class="text-blue-600 font-bold" href="list.html">解决方案</a>
      <a class="text-slate-600 hover:text-blue-600 font-bold" href="#">核心领域</a>
      <a class="text-slate-600 hover:text-blue-600 font-bold" href="#">技术架构</a>
      <a class="text-slate-600 hover:text-blue-600 font-bold" href="#">案例研究</a>
    </div>

    <button id="menu-toggle-btn" onclick="openMenu()" class="md:hidden flex flex-col justify-center items-center w-10 h-10 outline-none">
      <span class="w-6 h-0.5 bg-slate-900"></span>
      <span class="w-6 h-0.5 bg-slate-900 my-1.5"></span>
      <span class="w-6 h-0.5 bg-slate-900"></span>
    </button>
  </div>
</nav>

<button id="close-btn" onclick="closeMenu()" class="hidden fixed top-4 right-6 z-[200] w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-lg outline-none">
  <span class="material-symbols-outlined text-slate-900 text-3xl">close</span>
</button>

<div id="mobile-drawer" class="fixed inset-y-0 right-0 w-64 bg-white shadow-2xl z-[150] transform translate-x-full transition-transform duration-300 ease-in-out md:hidden">
  <div class="p-8 pt-24 flex flex-col space-y-8">
    <a class="text-xl font-bold text-blue-600" href="list.html">解决方案</a>
    <a class="text-xl font-bold text-slate-700" href="#">核心领域</a>
    <a class="text-xl font-bold text-slate-700" href="#">技术架构</a>
    <a class="text-xl font-bold text-slate-700" href="#">案例研究</a>
  </div>
</div>

<div id="menu-overlay" onclick="closeMenu()" class="fixed inset-0 bg-black/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-[140] md:hidden"></div>

<script>
  const drawer = document.getElementById('mobile-drawer');
  const overlay = document.getElementById('menu-overlay');
  const menuBtn = document.getElementById('menu-toggle-btn');
  const closeBtn = document.getElementById('close-btn');

  function openMenu() {
    drawer.classList.remove('translate-x-full');
    overlay.classList.remove('opacity-0', 'pointer-events-none');
    overlay.classList.add('opacity-100');

    menuBtn.classList.add('hidden');
    closeBtn.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    drawer.classList.add('translate-x-full');
    overlay.classList.add('opacity-0', 'pointer-events-none');
    overlay.classList.remove('opacity-100');

    menuBtn.classList.remove('hidden');
    closeBtn.classList.add('hidden');
    document.body.style.overflow = '';
  }

  function toggleMobileMenu() {
    if (drawer.classList.contains('translate-x-full')) openMenu();
    else closeMenu();
  }
</script>
