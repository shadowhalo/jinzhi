<!-- 修复汉堡导航+弹窗冲突的JS -->
<script>
// 等页面完全加载后执行，避免和导航JS冲突
window.onload = function() {
  // 弹窗核心逻辑
  const modal = document.getElementById('consultModal');
  const openBtn = document.getElementById('openModal');
  const closeBtn = document.getElementById('closeModal');
  
  // 容错：元素不存在则不执行，避免报错影响导航
  if (!modal || !openBtn || !closeBtn) return;

  // 打开弹窗
  openBtn.addEventListener('click', function(e) {
    // 阻止事件冒泡，避免触发导航的点击事件
    e.stopPropagation();
    // 锁定body但不影响导航
    document.body.style.overflow = 'hidden';
    document.body.style.paddingRight = '0px'; // 修复滚动条偏移
    modal.style.opacity = '1';
    modal.style.pointerEvents = 'auto';
    modal.querySelector('div').style.transform = 'scale(1)';
  });

  // 关闭弹窗
  function closeModal(e) {
    if (e) e.stopPropagation();
    document.body.style.overflow = '';
    document.body.style.paddingRight = '';
    modal.style.opacity = '0';
    modal.style.pointerEvents = 'none';
    modal.querySelector('div').style.transform = 'scale(0.95)';
  }

  // 关闭按钮+蒙层点击关闭
  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  // ESC键关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.style.opacity === '1') {
      closeModal();
    }
  });

  // 修复窗口缩放时弹窗居中
  window.addEventListener('resize', function() {
    if (modal.style.opacity === '1') {
      modal.style.display = 'flex';
      modal.querySelector('div').style.transform = 'scale(1)';
    }
  });

  // 修复汉堡导航：确保导航层级高于弹窗蒙层，低于弹窗主体
  const navElements = document.querySelectorAll('header, .glass-nav, [class*="nav"]');
  navElements.forEach(el => {
    if (el.style.zIndex === '') {
      el.style.zIndex = '998'; // 导航层级998 < 弹窗蒙层999 < 弹窗主体1000
    }
  });
};
</script>
