<!-- 咨询弹窗 -->
<div id="consultModal" class="fixed inset-0 z-[9999] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4 text-center">
        <button id="closeModalBtn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <span class="material-symbols-outlined">close</span>
        </button>
        <h3 class="text-xl font-bold text-gray-800 mb-4">更多详情，请添加微信</h3>
        <div class="flex justify-center mb-4">
            <img src="wechat-qrcode.png" alt="微信二维码" class="w-48 h-48 object-cover rounded-lg border border-gray-200">
        </div>
        <p class="text-gray-600 font-medium">或者搜索微信号 <span class="text-primary font-bold">XXXXXX</span></p>
    </div>
</div>

<script>
// 所有功能只写在这里，不改动其他任何地方！
window.onload = function(){
    // 汉堡菜单
    const hBtn = document.getElementById('hamburgerBtn');
    const cBtn = document.getElementById('closeNavBtn');
    const mNav = document.getElementById('mobileNav');
    
    if(hBtn && mNav) {
        hBtn.onclick = () => {
            mNav.style.right = "0";
            mNav.style.opacity = "1";
        };
    }
    if(cBtn && mNav) {
        cBtn.onclick = () => {
            mNav.style.right = "-280px";
            mNav.style.opacity = "0";
        };
    }

    // 咨询弹窗
    const consultBtn = document.getElementById('consultBtn');
    const consultModal = document.getElementById('consultModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    if(consultBtn) {
        consultBtn.addEventListener('click', () => {
            consultModal.classList.remove('opacity-0', 'pointer-events-none');
        });
    }
    if(closeModalBtn) {
        closeModalBtn.addEventListener('click', () => {
            consultModal.classList.add('opacity-0', 'pointer-events-none');
        });
    }
    if(consultModal) {
        consultModal.addEventListener('click', (e) => {
            if(e.target === consultModal) {
                consultModal.classList.add('opacity-0', 'pointer-events-none');
            }
        });
    }
}
</script>
