    <!-- 桌面端导航 - 大屏显示 -->
    <div class="hidden md:flex items-center space-x-8">
      <a class="text-blue-600 border-b-2 border-blue-600 pb-1 font-manrope font-bold tracking-tight" href="#">解决方案</a>
      <a class="text-slate-600 hover:text-blue-600 transition-colors font-manrope font-bold tracking-tight" href="#">核心领域</a>

<!-- 遮罩层 -->
<div class="overlay" id="overlay"></div>

<!-- 关闭按钮 - 独立出来，浮在最上层 -->
<div class="close-btn" id="closeBtn">
  <span class="material-symbols-outlined text-2xl">close</span>
</div>

<!-- 移动端导航菜单 -->
<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="#" class="text-blue-600">解决方案</a></li>
    <li><a href="#">核心领域</a></li>
    <li><a href="#">技术架构</a></li>
    <li><a href="#">案例研究</a></li>
  </ul>
</div>

<!-- 移动端导航交互脚本（仅保留导航相关） -->
<script>
// 获取DOM元素
const menuToggle = document.getElementById('menuToggle');
const closeBtn = document.getElementById('closeBtn');
const mobileMenu = document.getElementById('mobileMenu');
const overlay = document.getElementById('overlay');

// 初始化隐藏关闭按钮
closeBtn.style.display = 'none';

// 打开菜单
menuToggle.addEventListener('click', function() {
  mobileMenu.classList.add('open');
  overlay.classList.add('show');
  menuToggle.style.display = 'none'; // 隐藏汉堡按钮
  closeBtn.style.display = 'flex';  // 显示关闭按钮（flex布局）
  document.body.style.overflow = 'hidden'; // 禁止页面滚动
});

// 关闭菜单函数
function closeMenu() {
  mobileMenu.classList.remove('open');
  overlay.classList.remove('show');
  closeBtn.style.display = 'none';   // 隐藏关闭按钮
  menuToggle.style.display = 'flex'; // 显示汉堡按钮
  document.body.style.overflow = 'auto'; // 恢复页面滚动
}

// 绑定关闭事件
closeBtn.addEventListener('click', closeMenu);
overlay.addEventListener('click', closeMenu);

// 窗口大小变化时重置菜单状态
window.addEventListener('resize', function() {
  if (window.innerWidth >= 768) { // md断点
    closeMenu();
  }
});
</script>
