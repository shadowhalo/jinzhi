<!-- 咨询弹窗（彻底修复居中问题） -->
<div id="consultModal" class="fixed top-0 left-0 w-full h-full z-[9999] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-[480px] relative scale-95 transition-transform duration-300" style="position: absolute !important; top: 500% !important; left: 50% !important; transform: translate(-50%, -50%) scale(0.95) !important;">
    <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    <div class="text-center">
      <h3 class="text-lg font-bold text-gray-800 mb-2">了解更多详情</h3>
      <p class="text-gray-500 mb-6">添加销售微信咨询</p>
      <img src="index.png" alt="微信二维码" class="w-[420px] h-[420px] mx-auto rounded-lg object-cover">
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const modal = document.getElementById('consultModal');
  const openBtn = document.getElementById('openModal');
  const closeBtn = document.getElementById('closeModal');

  if (!modal || !openBtn || !closeBtn) return;

  // 打开弹窗
  openBtn.addEventListener('click', function() {
    document.body.style.overflow = 'hidden';
    modal.classList.add('opacity-100', 'pointer-events-auto');
    modal.querySelector('div').style.transform = 'translate(-50%, -50%) scale(1) !important';
  });

  // 关闭弹窗
  function closeModal() {
    document.body.style.overflow = '';
    modal.classList.remove('opacity-100', 'pointer-events-auto');
    modal.querySelector('div').style.transform = 'translate(-50%, -50%) scale(0.95) !important';
  }

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  // 兼容窗口缩放
  window.addEventListener('resize', function() {
    if (modal.classList.contains('opacity-100')) {
      const modalContent = modal.querySelector('div');
      modalContent.style.top = '50% !important';
      modalContent.style.left = '50% !important';
      modalContent.style.transform = 'translate(-50%, -50%) scale(1) !important';
    }
  });
});
</script>

<script>
setTimeout(() => {
    const hBtn = document.getElementById('hamburgerBtn');
    const cBtn = document.getElementById('closeNavBtn');
    const mNav = document.getElementById('mobileNav');
    
    if(hBtn && mNav) {
        hBtn.onclick = () => {
            mNav.style.right = "0";
            mNav.style.opacity = "1";
        };
    }
    if(cBtn && mNav) {
        cBtn.onclick = () => {
            mNav.style.right = "-280px";
            mNav.style.opacity = "0";
        };
    }
}, 300);
</script>
