<script>
// 第一步：先加载头部/底部
fetch('header.html').then(res=>res.text()).then(html=>{
  document.getElementById('header-container').innerHTML = html;
  // 头部加载完成后，初始化头部事件
  initHeader();
});
fetch('footer.html').then(res=>res.text()).then(html=>{
  document.getElementById('footer-container').innerHTML = html;
});

// 第二步：头部事件初始化函数（原头部代码不动，直接复用）
function initHeader() {
  const bind = () => {
    const hBtn = document.getElementById('hamburgerBtn');
    const cBtn = document.getElementById('closeNavBtn');
    const mNav = document.getElementById('mobileNav');
    const consultBtn = document.getElementById('consultBtn');
    const consultModal = document.getElementById('consultModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    if (hBtn && mNav) {
      hBtn.onclick = () => {
        mNav.style.right = '0';
        mNav.style.opacity = '1';
      };
    }
    if (cBtn && mNav) {
      cBtn.onclick = () => {
        mNav.style.right = '-280px';
        mNav.style.opacity = '0';
      };
    }
    if (consultBtn && consultModal) {
      consultBtn.onclick = () => {
        consultModal.classList.remove('opacity-0', 'pointer-events-none');
      };
    }
    if (closeModalBtn && consultModal) {
      closeModalBtn.onclick = () => {
        consultModal.classList.add('opacity-0', 'pointer-events-none');
      };
    }
    if (consultModal) {
      consultModal.onclick = (e) => {
        if (e.target === consultModal) {
          consultModal.classList.add('opacity-0', 'pointer-events-none');
        }
      };
    }
  };

  if (document.getElementById('hamburgerBtn')) {
    bind();
  } else {
    setTimeout(initHeader, 50);
  }
}

// 第三步：原有布局切换逻辑（完全不动）
const container = document.getElementById('solutions-container');
const cards = document.querySelectorAll('.solution-card');
const cardImages = document.querySelectorAll('.card-image');
function setGridView() {
container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10';
cards.forEach(card => {
card.className = 'group bg-surface-container-lowest rounded-xl overflow-hidden hover:shadow-2xl hover:shadow-primary/5 transition-all duration-500 border border-transparent hover:border-primary/10 solution-card flex flex-col';
});
cardImages.forEach(img => {
img.className = 'card-image aspect-video overflow-hidden relative w-full shrink-0 transition-all duration-500';
});
}
function setListView() {
container.className = 'flex flex-col gap-8';
cards.forEach(card => {
card.className = 'group bg-surface-container-lowest rounded-xl overflow-hidden hover:shadow-2xl hover:shadow-primary/5 transition-all duration-500 border border-transparent hover:border-primary/10 solution-card flex flex-col md:flex-row items-stretch';
});
cardImages.forEach(img => {
img.className = 'card-image overflow-hidden relative w-full md:w-[40%] shrink-0 transition-all duration-500 min-h-[250px]';
});
}

// 第四步：业务筛选逻辑（DOM加载完成后执行）
document.addEventListener('DOMContentLoaded', function() {
    const filterBtns = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('.solution-card');
    const allBtn = filterBtns[0];

    // 样式已改为py-4，和你修改的一致
    const styles = {
    active: 'p-4 bg-surface-container-lowest text-primary font-semibold rounded-xl shadow-sm transition-all',
    inactive: 'p-4 hover:bg-surface-container-lowest/50 text-on-surface-variant font-medium rounded-xl transition-all'
};

    // 初始化默认选中全部业务
    filterBtns.forEach(b => {
        b.className = styles.inactive;
    });
    allBtn.className = styles.active;
    cards.forEach(card => {
        card.style.display = 'flex';
    });

    // 业务筛选点击事件
    filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            filterBtns.forEach(b => {
                b.className = styles.inactive;
            });
            this.className = styles.active;

            const category = this.dataset.category;
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
});
</script>
