<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>解决方案 - 锦致科技</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#0050d4",
            secondary: "#702ae1",
            background: "#f5f7f9",
            "on-surface": "#2c2f31",
          },
          fontFamily: {
            headline: ["Manrope"],
            body: ["Inter"],
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav { backdrop-filter: blur(20px); }
  </style>
</head>
<body class="font-body bg-background text-on-surface">

  <div id="header"></div>

  <main class="pt-28 pb-20 max-w-7xl mx-auto px-6">
    <div class="mb-10">
      <span class="text-primary font-semibold">专业解决方案</span>
      <h1 class="text-4xl font-headline font-bold mt-2">智能基础设施解决方案</h1>
      <p class="mt-4 text-gray-600">覆盖文旅、农业、社区、工业等多领域数字化服务</p>
    </div>

    <div class="flex gap-4 mb-10 flex-wrap">
      <button class="px-4 py-2 bg-primary text-white rounded-full">全部项目</button>
      <button class="px-4 py-2 bg-white rounded-lg shadow">文旅</button>
      <button class="px-4 py-2 bg-white rounded-lg shadow">农业</button>
      <button class="px-4 py-2 bg-white rounded-lg shadow">社区</button>
      <button class="px-4 py-2 bg-white rounded-lg shadow">工业</button>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
      <div class="bg-white rounded-xl overflow-hidden shadow hover:shadow-md transition-shadow">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuFnV1kE4XdpQXwQkE2m" class="w-full h-48 object-cover">
        <div class="p-6">
          <span class="text-sm text-primary">文旅</span>
          <h3 class="text-xl font-bold mt-2">智慧目的地管理</h3>
          <p class="mt-2 text-gray-600">实时客流分析、智能调度、全域体验升级</p>
          <a href="detail.html" class="mt-4 inline-block text-primary font-semibold">了解更多 →</a>
        </div>
      </div>

      <div class="bg-white rounded-xl overflow-hidden shadow hover:shadow-md transition-shadow">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuFnV1kE4XdpQXwQkE2m" class="w-full h-48 object-cover">
        <div class="p-6">
          <span class="text-sm text-primary">农业</span>
          <h3 class="text-xl font-bold mt-2">AI 作物优化</h3>
          <p class="mt-2 text-gray-600">大数据监测、精准灌溉、产量预测与智能管理</p>
          <a href="detail.html" class="mt-4 inline-block text-primary font-semibold">了解更多 →</a>
        </div>
      </div>

      <div class="bg-white rounded-xl overflow-hidden shadow hover:shadow-md transition-shadow">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuFnV1kE4XdpQXwQkE2m" class="w-full h-48 object-cover">
        <div class="p-6">
          <span class="text-sm text-primary">社区</span>
          <h3 class="text-xl font-bold mt-2">智能社区设计</h3>
          <p class="mt-2 text-gray-600">数字孪生、安全治理、低碳与便民服务融合</p>
          <a href="detail.html" class="mt-4 inline-block text-primary font-semibold">了解更多 →</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    fetch("header.html").then(res=>res.text()).then(html=>document.getElementById("header").innerHTML=html);
    fetch("footer.html").then(res=>res.text()).then(html=>document.getElementById("footer").innerHTML=html);
  </script>
</body>
</html>
